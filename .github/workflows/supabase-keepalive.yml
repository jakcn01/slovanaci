name: Supabase Keepalive

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping-db:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PING_TABLE: ${{ secrets.SUPABASE_PING_TABLE }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secret."
            exit 1
          fi

          TABLE="${SUPABASE_PING_TABLE:-Teams}"
          URL="${SUPABASE_URL}/rest/v1/${TABLE}?select=*&limit=1"

          status_code=$(curl -sS -o response.json -w "%{http_code}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            "${URL}")

          echo "Status: ${status_code}"
          cat response.json

          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            echo "Supabase keepalive ping failed."
            exit 1
          fi
